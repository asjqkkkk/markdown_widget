name: Build-Windows-Desktop

on:
  push:
    branches: [main,test_action]
  pull_request:
    branches: [main,test_action]

env:
  FLUTTER_VERSION: ${{ inputs.flutter_version != '' && inputs.flutter_version || vars.FLUTTER_VERSION || '3.27.4' }}
  JAVA_VERSION:    ${{ vars.JAVA_VERSION || '21' }}

jobs:
  windows-desktop:
    runs-on: windows-latest          # ← 必须用 Windows runner
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: master
          cache: true

      - run: flutter config --enable-windows-desktop

      - name: Build Windows desktop
        working-directory: example
        run: |
          flutter pub get
          flutter build windows --release

      - name: Zip binaries
        working-directory: example
        run: |
          7z a windows-x64.zip ./build/windows/x64/runner/Release/*

      - name: Upload Windows desktop zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop
          path: example/windows-x64.zip
